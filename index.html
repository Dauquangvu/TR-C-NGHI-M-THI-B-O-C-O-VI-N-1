<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi Trắc Nghiệm Nâng Cao</title>
<style>
/* ===== BODY & TIÊU ĐỀ ===== */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f7fa;
    margin:0;
    padding:15px;
}
h1 {
    text-align:center;
    font-size:2rem;
    margin-bottom:10px;
    color:#c0392b;
    text-shadow: 0 0 5px #f1c40f;
}
#timer {
    font-size:1.5rem;
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
    color:#2c3e50;
}
#timer.urgent {
    color:red;
    animation: blink 1s infinite;
}
@keyframes blink {
    0%,50%,100% {opacity:1;}
    25%,75% {opacity:0;}
}

/* ===== CARD CÂU HỎI ===== */
.question-card {
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}
.question-card:hover {
    transform: translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
}
.question-text {
    font-weight:bold;
    margin-bottom:10px;
    font-size:1rem;
}

/* ===== BUTTON ĐÁP ÁN ===== */
.answers button {
    display:block;
    width:100%;
    text-align:left;
    margin-bottom:8px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#ecf0f1;
    cursor:pointer;
    transition: background 0.2s, font-size 0.2s;
    font-size:0.95rem;
}
.answers button:hover {background:#d0d7de;}
.answers button.selected {background:#3498db; color:white;}
.correct {background:#2ecc71 !important; color:white;}
.wrong {background:#e74c3c !important; color:white;}

/* ===== BUTTON NỘP BÀI ===== */
#submitBtn {
    background: linear-gradient(45deg,#e74c3c,#c0392b);
    color:white;
    font-size:1.1rem;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
    display:block;
    width:100%;
}
#submitBtn:hover {opacity:0.9;}

/* ===== KẾT QUẢ ===== */
#result {
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    font-size:1rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    h1 { font-size:1.6rem; }
    #timer { font-size:1.3rem; }
    .question-text { font-size:0.95rem; }
    .answers button { font-size:0.9rem; padding:8px; }
    #submitBtn { font-size:1rem; padding:10px; }
}
@media (max-width: 480px) {
    body { padding:5px; }
    h1 { font-size:1.4rem; }
    #timer { font-size:1.1rem; }
    .question-text { font-size:0.9rem; }
    .answers button { font-size:0.85rem; padding:6px; }
    #submitBtn { font-size:0.95rem; padding:8px; }
}
</style>
</head>
<body>

<h1>🔥 Bài Thi Trắc Nghiệm</h1>
<div id="timer">Thời gian: 45:00</div>

<div id="questionsContainer"></div>

<button id="submitBtn">Nộp bài</button>

<div id="result"></div>

<script>
// ====== CÂU HỎI ======
const rawQuestions = [
    // Dán 200 câu vào đây
    // Ví dụ:
    {
        q: "Đồng chí cho biết chức năng của công tác tuyên truyền miệng ?",
        answers: [
            "Phổ biến thông tin. Định hướng tư tưởng. Hướng dẫn hành động",
            "Phổ biến thông tin. Định hướng tư tưởng. Cổ vũ hành động",
            "Phổ biến thông tin. Định hướng nhận thức. Cổ vũ hành động",
            "Phổ biến thông tin. Định hướng nhận thức. Hướng dẫn hành động"
        ],
        correct: 1
    },
    {
        q: "Ví dụ câu 2?",
        answers:["A","B","C","D"],
        correct:0
    }
];

// ====== CHỌN NGẪU NHIÊN 50 CÂU ======
const TOTAL_QUESTIONS = 50;
const questions = rawQuestions.sort(()=>0.5-Math.random()).slice(0,TOTAL_QUESTIONS);

const container = document.getElementById("questionsContainer");

// ====== HIỂN THỊ CÂU HỎI ======
questions.forEach((q,i)=>{
    const card = document.createElement("div");
    card.classList.add("question-card");
    card.innerHTML = `<div class="question-text">Câu ${i+1}: ${q.q}</div>
                      <div class="answers"></div>`;
    const answersDiv = card.querySelector(".answers");
    q.answers.forEach((a,j)=>{
        const btn = document.createElement("button");
        btn.textContent = a;
        btn.addEventListener("click",()=>{
            answersDiv.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
            btn.classList.add("selected");
            q.userAnswer = j;
        });
        answersDiv.appendChild(btn);
    });
    container.appendChild(card);
});

// ====== ĐỒNG HỒ 45 PHÚT ======
let timeLeft = 45*60;
const timerEl = document.getElementById("timer");
const timerInterval = setInterval(()=>{
    const min = Math.floor(timeLeft/60);
    const sec = timeLeft%60;
    timerEl.textContent = `Thời gian: ${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    if(timeLeft<=5*60) timerEl.classList.add("urgent");
    if(timeLeft<=0){
        clearInterval(timerInterval);
        submitQuiz();
    }
    timeLeft--;
},1000);

// ====== NỘP BÀI ======
const submitBtn = document.getElementById("submitBtn");
submitBtn.addEventListener("click",submitQuiz);

function submitQuiz(){
    clearInterval(timerInterval);
    let score = 0;
    questions.forEach((q,index)=>{
        const cardBtns = container.children[index].querySelectorAll("button");
        cardBtns.forEach((btn,idx)=>{
            btn.disabled = true;
            if(idx===q.correct) btn.classList.add("correct");
            if(q.userAnswer===idx && q.userAnswer!==q.correct) btn.classList.add("wrong");
        });
        if(q.userAnswer===q.correct) score++;
    });
    document.getElementById("result").innerHTML = `<h2>Kết quả: ${score}/${TOTAL_QUESTIONS}</h2>`;
}
</script>

</body>
</html>
